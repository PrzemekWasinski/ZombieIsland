<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

    <form onsubmit="login(event)">
        <label>Login</label>
        <div>
            <label>Username</label>
            <input type="text" id="login_username"/>
        </div>
        <div>
            <label>Password</label>
            <input type="password" id="login_password"/>
        </div>
        <div>
            <input type="submit" value="Login">
        </div>
    </form id="form">

    <script type="text/javascript">
        function login(event) {
            event.preventDefault();

            let password = document.getElementById("login_password").value;
            let username = document.getElementById("login_username").value;
            let score = 0;

           if (localStorage.getItem(username) == password) {
            console.log("logged in")
            let params = new URLSearchParams();
            params.append("username", username);
            params.append("score", 0);
            setTimeout(() => {  window.location.href = "index.html?" + params.toString(); }, 3000);
            // at the end of the game put username and score in game page local storage
           } else {
            console.log("Username and password do not match")
           }
        }
    </script>

    <form onsubmit="register()">
        <label>Register</label>
        <div>
            <label>Username</label>
            <input type="text" id="register_username"/>
        <div>
        <div>
            <label>Password</label>
            <input type="password" id="register_password"/>
        <div>
        <div>
            <label>Confirm password</label>
            <input type="password" id="confirm_password"/>
        <div>
        <div>
            <input type="submit" value="Register" />
        </div>
    </form>

    <script type="text/javascript">
        function register() {

            let username = document.getElementById("register_username").value;
            let password = document.getElementById("register_password").value;
            let confirm_password = document.getElementById("confirm_password").value;
            let score = 0;

            if (localStorage.getItem(username) != null) {
                console.log("Account already exists, please login")
            } else if (new String(password).valueOf() == new String(confirm_password).valueOf()) {
                localStorage.setItem(username, password)
                console.log("Register successful, please login")
            } else {
                console.log("Passswords dont match!") // make it a pop up
            }
        }
    </script>
</body>
</html>
